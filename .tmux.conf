set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
unbind -n M-[

unbind r
bind r source-file ~/.tmux.conf


# Start windows and panes at 1, not 0.
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set vi-mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g prefix C-Space

set -g mouse on

# Make the panes easier to distinguish
set -g pane-border-lines double

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Smart pane switching with awareness of nvim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind Left split-window -hb -c "#{pane_current_path}"
bind Right split-window -h -c "#{pane_current_path}"
bind Up split-window -vb -c "#{pane_current_path}"
bind Down split-window -v -c "#{pane_current_path}"

# Bindings to re-order windows
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

bind-key n previous-window
bind-key . next-window

# Import catppuccin theme manually (not via TPM)
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# TPM Plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tpm'

# Tmux resurrect options
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Customize tmux statusbar to look cool and simple. Colors are from catppuccin.
bg='#181825' # Base
fg='#7f849c' # Overlay 1
fg_prefix='#a6e3a1' # Green
fg_window_index='#6c7086' # Overlay 0
fg_current_window_index='#89b4fa' # Blue
fg_current_window_title='#f5e0dc' # Rosewater
set-option -g status-justify "absolute-centre"
set-window-option -g window-status-separator " • "
set-option -g status-left "#[bg=$bg,fg=$fg]#{?client_prefix,, #S }#[bg=$fg_prefix,fg=$bg,bold]#{?client_prefix, #S ,}#[bg=$bg,fg=${fg}]"
# status-right: xcbuild build monitor — in-flight builds plus the past hour's
# successes/failures. Emits nothing when there's nothing to report.
set-option -g status-right "#(~/Developer/utilities/xcbuild-status.zsh)"
set-option -g status-interval 5
set -g window-status-format "#[fg=$fg_window_index,bg=$bg,nobold]#[fg=$bg,bg=$fg_window_index,nobold]#I #[fg=$fg,bg=$bg,nobold] #W"
set -g window-status-current-format "#[fg=$fg_current_window_index,bg=$bg,nobold]#[fg=$bg,bg=$fg_current_window_index,nobold]#I #[fg=$fg_current_window_title,bg=$bg,nobold] #W"

# AI assistant status panel — managed via TPM
set -g @plugin 'git@github.com:eedmond/tmux-ai-status.git'

# Notes popup — C-Space C-n opens ~/Documents/Tmux/Notes.md in neovim
bind-key C-n display-popup -E -w "80%" -h "85%" -b "rounded" -T " Notes " \
    "mkdir -p ~/Documents/Tmux && touch ~/Documents/Tmux/Notes.md; nvim ~/Documents/Tmux/Notes.md"

# Lazygit popup — C-Space C-g opens lazygit in the current pane's path
bind-key C-g popup -d '#{pane_current_path}' -xC -yC -w 90% -h 90% -E lazygit

# Yazi: C-f opens a fresh session at the current pane's path; F reuses the
# existing one; C-b jumps back to the previous session.
bind-key C-f run-shell 'tmux kill-session -t yazi 2>/dev/null; tmux new-session -d -s yazi -c "#{pane_current_path}" yazi' \; switch-client -t yazi
bind-key F if-shell 'tmux has-session -t yazi 2>/dev/null' \
    'switch-client -t yazi' \
    'display-message "No yazi session yet — press C-f to start one"'
bind-key C-b switch-client -l

# xcopen popup — <leader>+X opens an Xcode project from the current pane's git repo.
# Single project opens immediately; multiple projects prompt for selection; errors
# wait for a keypress before closing so the message is visible.
bind-key X display-popup -E -d '#{pane_current_path}' -w 50% -h 30% -b rounded -T " xcopen " \
    "zsh -ic 'xcopen || { print; print -n Press any key to close...; read -k 1; }'"

# xcbuild popup — <leader>+B opens the build/deploy picker. Builds run in
# windows of a shared `xcbuild` tmux session, so closing the popup leaves them
# running. `tmux attach -t xcbuild` to browse builds in tmux directly.
bind-key B display-popup -E -d '#{pane_current_path}' -w 90% -h 90% -b rounded -T " xcbuild " \
    "zsh -ic 'xcbuild || { print; print -n Press any key to close...; read -k 1; }'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
